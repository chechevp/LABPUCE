<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Inventario Laboratorio PUCE</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Extra background animations specifically for login */
        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            top: 20%;
            left: 25%;
            animation: floatGlow 10s ease-in-out infinite alternate;
        }
        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <div class="auth-logo">PUCE <span>LABS</span></div>
                <div class="auth-subtitle">Gestión de Inventario y Préstamos</div>
            </div>

            <div id="alertContainer" class="alert alert-danger">
                <span id="alertMessage"></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Correo Institucional</label>
                    <input type="email" id="email" class="form-control" placeholder="ejemplo@pucesa.edu.ec" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Iniciar Sesión
                </button>
            </form>
        </div>
    </div>

    <script>
        // Check if token already exists, redirect to dashboard if active
        const token = localStorage.getItem('session_token');
        if (token) {
            window.location.href = 'dashboard.html';
        }

        const loginForm = document.getElementById('loginForm');
        const alertContainer = document.getElementById('alertContainer');
        const alertMessage = document.getElementById('alertMessage');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertContainer.style.display = 'none';

            const correo = document.getElementById('email').value.trim();
            const contrasena = document.getElementById('password').value;

            // Client side validation for pucesa.edu.ec domain
            if (!correo.toLowerCase().endsWith('@pucesa.edu.ec')) {
                showAlert('El correo ingresado no pertenece al dominio institucional @pucesa.edu.ec.');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ correo, contrasena })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.mensaje || 'Error al iniciar sesión.');
                }

                // Save session details
                localStorage.setItem('session_token', data.token);
                localStorage.setItem('user_name', data.nombre);
                localStorage.setItem('user_role', data.rol);
                localStorage.setItem('user_email', data.correo);
                localStorage.setItem('user_role_id', data.rolId.toString());

                // Redirect target
                window.location.href = data.redirect || 'dashboard.html';
            } catch (err) {
                showAlert(err.message);
            } finally {
                setLoading(false);
            }
        });

        function showAlert(msg) {
            alertMessage.textContent = msg;
            alertContainer.style.display = 'flex';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Validando credenciales...';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar Sesión';
            }
        }
    </script>
</body>
</html>
